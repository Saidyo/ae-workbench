name: Feature request
description: Suggest an improvement for AE Workbench.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What would you like AE Workbench to do?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add references, screenshots, or workflow notes if useful.
