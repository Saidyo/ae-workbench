name: 功能建议
description: 为 AE Workbench 提出改进建议。
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 使用场景
      description: 这个功能想解决什么工作流问题？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 你希望 AE Workbench 如何支持这个功能？
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: 可以补充参考图、截图、使用流程或其他背景信息。
