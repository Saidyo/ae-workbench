name: 问题反馈
description: 反馈 AE Workbench 中可以复现的问题。
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: 问题概述
      description: 发生了什么？
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请写出复现这个问题的操作步骤。
      placeholder: |
        1. 打开 AE Workbench
        2. 进入……
        3. 点击……
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: 版本
      placeholder: 0.1.0
  - type: input
    id: system
    attributes:
      label: 系统环境
      placeholder: Windows 11, Node.js 22
  - type: textarea
    id: logs
    attributes:
      label: 日志或截图
      description: 如果有日志、截图或错误信息，可以贴在这里。
